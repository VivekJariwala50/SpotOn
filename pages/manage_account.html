<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Manage account — SpotOn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <style>
      .account-shell {
        width: 100%;
        max-width: 1040px;
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 16px;
        overflow: hidden;
      }

      .account-layout {
        display: grid;
        grid-template-columns: 180px 1fr;
        min-height: 420px;
      }

      .account-sidebar {
        border-right: 1px solid #ececec;
        background: #fff;
      }

      .account-sidebar a {
        display: block;
        padding: 16px 22px;
        color: #1f2937;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .account-sidebar a.active {
        background: #f3f4f6;
      }

      .account-main {
        padding: 28px 24px;
      }

      .account-hero {
        text-align: center;
      }

      .account-avatar {
        width: 78px;
        height: 78px;
        border-radius: 999px;
        object-fit: cover;
        border: 2px solid #fff;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
      }

      .account-name {
        margin: 10px 0 2px;
        font-size: 1.95rem;
        font-weight: 900;
        line-height: 1.1;
      }

      .account-email {
        margin: 0;
        color: #6b7280;
        font-size: 0.95rem;
      }

      .account-tiles {
        margin-top: 26px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .account-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 96px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        background: #f5f5f5;
        color: #111827;
        font-size: 1rem;
        font-weight: 800;
      }

      .account-tile-icon {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #111;
      }

      .account-tile-icon svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      @media (max-width: 820px) {
        .account-layout {
          grid-template-columns: 1fr;
        }

        .account-sidebar {
          border-right: 0;
          border-bottom: 1px solid #ececec;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .account-tiles {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="auth-page auth-page-with-nav">
    {% include "_driver_static_nav.html" %}
    <div class="account-shell compact-page">
      <div class="account-layout">
        <aside class="account-sidebar">
          <a class="active" href="{{ url_for('manage_account') }}">Home</a>
          <a href="{{ url_for('account_personal_info') }}">Personal info</a>
          <a href="{{ url_for('account_security') }}">Security</a>
          <a href="{{ url_for('favorites') }}">Favorite lots</a>
        </aside>

        <main class="account-main">
          <div class="account-hero">
            <img
              src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=220&q=80"
              alt="Profile avatar"
              class="account-avatar"
            />
            <h1 class="account-name">{{ user_name }}</h1>
            <p class="account-email">{{ user_email }}</p>
          </div>

          <div class="account-tiles">
            <a href="{{ url_for('account_personal_info') }}" class="account-tile">
              <span class="account-tile-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.33 0-8 2.17-8 5v1h16v-1c0-2.83-3.67-5-8-5Z"/>
                </svg>
              </span>
              <span>Personal info</span>
            </a>
            <a href="{{ url_for('account_security') }}" class="account-tile">
              <span class="account-tile-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 2 4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5l-8-3Zm0 3.1 5 1.88V11c0 3.98-2.47 7.8-5 9.19-2.53-1.39-5-5.21-5-9.19V6.98l5-1.88Z"/>
                </svg>
              </span>
              <span>Security</span>
            </a>
            <a href="{{ url_for('favorites') }}" class="account-tile">
              <span class="account-tile-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="m12 21-1.45-1.32C5.4 15.02 2 11.94 2 8.15A5.15 5.15 0 0 1 7.15 3 5.62 5.62 0 0 1 12 5.24 5.62 5.62 0 0 1 16.85 3 5.15 5.15 0 0 1 22 8.15c0 3.79-3.4 6.87-8.55 11.54Z"/>
                </svg>
              </span>
              <span>Favorite lots</span>
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
