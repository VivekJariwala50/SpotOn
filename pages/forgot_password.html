<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Forgot Password — SpotOn Smart Parking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="{{ url_for('home') }}" class="text-logo">Spot<span>On</span></a>
        <h1>Forgot Password</h1>
        <p>Enter your email to generate a password reset link.</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-messages">
            {% for category, message in messages %}
              <div class="flash-message {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="field">
          <label for="email">EMAIL ADDRESS</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="name@example.com"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary full-width" style="margin-top: 16px;">
          Generate Reset Link
        </button>
      </form>

      <div class="auth-links">
        Remembered your password? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </body>
</html>
