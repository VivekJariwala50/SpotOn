<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>System status — SpotOn Smart Parking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body class="auth-page">
    <div class="auth-card auth-card--narrow">
      <div class="auth-header">
        <a href="{{ url_for('home') }}" class="text-logo">Spot<span>On</span></a>
        <h1>System status</h1>
        <p>Operational snapshot for the demo environment.</p>
      </div>

      <div class="status-panel">
        <p class="status-ok">All systems operational</p>
        <p class="status-meta">Last checked: {{ checked_at }}</p>
        <p class="status-note">
          This page is informational. The API health check is available at
          <code>/health</code> for integrations.
        </p>
      </div>

      <p class="legal-back">
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to home</a>
      </p>
    </div>
  </body>
</html>
