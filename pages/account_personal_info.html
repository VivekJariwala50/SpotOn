<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Personal info — SpotOn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <style>
      .account-shell { width: 100%; max-width: 1040px; background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; overflow: hidden; }
      .account-layout { display: grid; grid-template-columns: 180px 1fr; min-height: 420px; }
      .account-sidebar { border-right: 1px solid #ececec; background: #fff; }
      .account-sidebar a { display: block; padding: 16px 22px; color: #1f2937; font-size: 0.95rem; font-weight: 600; }
      .account-sidebar a.active { background: #f3f4f6; }
      .account-main { padding: 28px 24px; }
      .account-main h1 { margin: 0 0 8px; font-size: 1.55rem; }
      .account-main p { margin: 0; color: #6b7280; }
      .account-tiles { margin-top: 22px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .account-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 110px; border-radius: 12px; border: 1px solid #e5e7eb; background: #f5f5f5; color: #111827; font-size: 1rem; font-weight: 800; }
      .account-tile-icon { width: 22px; height: 22px; color: #111; display: inline-flex; }
      .account-tile-icon svg { width: 100%; height: 100%; fill: currentColor; }
      @media (max-width: 820px) {
        .account-layout { grid-template-columns: 1fr; }
        .account-sidebar { border-right: 0; border-bottom: 1px solid #ececec; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .account-tiles { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body class="auth-page auth-page-with-nav">
    {% include "_driver_static_nav.html" %}
    <div class="account-shell compact-page">
      <div class="account-layout">
        <aside class="account-sidebar">
          <a href="{{ url_for('manage_account') }}">Home</a>
          <a class="active" href="{{ url_for('account_personal_info') }}">Personal info</a>
          <a href="{{ url_for('account_security') }}">Security</a>
          <a href="{{ url_for('favorites') }}">Favorite lots</a>
        </aside>
        <main class="account-main">
          <h1>Personal info</h1>
          <p>Manage your profile and registered vehicles.</p>
          <div class="account-tiles">
            <a href="{{ url_for('profile') }}" class="account-tile">
              <span class="account-tile-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.33 0-8 2.17-8 5v1h16v-1c0-2.83-3.67-5-8-5Z"/></svg></span>
              <span>Profile</span>
            </a>
            <a href="{{ url_for('vehicles') }}" class="account-tile">
              <span class="account-tile-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M18.92 6.01A1 1 0 0 0 18 5h-1V3h-2v2H9V3H7v2H6a1 1 0 0 0-.92 1.38L6 9v10a1 1 0 0 0 1 1h1v-2h8v2h1a1 1 0 0 0 1-1V9l.92-2.61A1 1 0 0 0 18.92 6.01ZM16 16H8v-5h8v5Zm1.43-9-.35-1H6.22l.35 1Z"/></svg></span>
              <span>Vehicles</span>
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
